<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Práctica de Exámenes</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="global-header">
    <div class="header-main">
      <div class="brand">
        <span class="brand-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="18" height="18"><path d="M12 3 1 8l11 5 9-4.09V15h2V8L12 3zm-7 9.18V16c0 2.21 3.13 4 7 4s7-1.79 7-4v-3.82l-7 3.18-7-3.18z" fill="#fff"/></svg>
        </span>
        <span class="brand-name">Práctica de Exámenes</span>
      </div>
    </div>
    <nav class="tabs">
      <button class="tab-btn" data-view="practice">Practicar</button>
      <button class="tab-btn" data-view="review">Repasar falladas</button>
      <button class="tab-btn" data-view="stats">Estadísticas</button>
    </nav>
  </header>

  <main id="app">
    <!-- Vista: Practicar -->
    <section id="view-practice" class="view">
      <div class="page-header">
        <span class="obj-icon obj-icon-practice" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="20" height="20"><path d="M8 5v14l11-7z" fill="#fff"/></svg>
        </span>
        <div>
          <div class="page-header-label">Exámenes</div>
          <h1>Practicar</h1>
        </div>
      </div>

      <div id="practice-setup" class="setup-card">
        <label>
          Examen
          <select id="practice-exam-select"></select>
        </label>
        <label>
          Modo
          <select id="practice-mode-select">
            <option value="free">Práctica libre (feedback inmediato)</option>
            <option value="timed">Simulacro cronometrado</option>
          </select>
        </label>
        <label>
          Número de preguntas
          <input type="number" id="practice-num-questions" value="60" min="1" />
        </label>
        <label id="time-limit-field">
          Tiempo límite (minutos)
          <input type="number" id="practice-time-limit" value="90" min="1" />
        </label>
        <button id="start-practice-btn" class="primary-btn">Empezar</button>
      </div>

      <div id="practice-runner" class="hidden"></div>
      <div id="practice-results" class="hidden"></div>
    </section>

    <!-- Vista: Repasar falladas -->
    <section id="view-review" class="view hidden">
      <div class="page-header">
        <span class="obj-icon obj-icon-review" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="20" height="20"><path d="M17.65 6.35A7.96 7.96 0 0 0 12 4a8 8 0 1 0 7.73 10h-2.08A6 6 0 1 1 12 6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z" fill="#fff"/></svg>
        </span>
        <div>
          <div class="page-header-label">Repaso</div>
          <h1>Repasar falladas</h1>
        </div>
      </div>
      <p class="hint">Repite las preguntas que más fallaste, priorizadas con repetición espaciada. Solo aparecen las que ya están "listas" para repasar.</p>

      <div id="review-setup" class="setup-card">
        <label>
          Examen
          <select id="review-exam-select"></select>
        </label>
        <label>
          Máximo de preguntas
          <input type="number" id="review-num-questions" value="20" min="1" />
        </label>
        <button id="start-review-btn" class="primary-btn">Empezar repaso</button>
      </div>

      <div id="review-runner" class="hidden"></div>
      <div id="review-results" class="hidden"></div>
    </section>

    <!-- Vista: Estadísticas -->
    <section id="view-stats" class="view hidden">
      <div class="page-header">
        <span class="obj-icon obj-icon-stats" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="20" height="20"><path d="M5 9.2h3V19H5zM10.6 5h2.8v14h-2.8zM16.2 13H19v6h-2.8z" fill="#fff"/></svg>
        </span>
        <div>
          <div class="page-header-label">Informes</div>
          <h1>Estadísticas</h1>
        </div>
      </div>
      <div id="stats-content"></div>
    </section>
  </main>

  <script src="js/data/exams.js"></script>
  <script src="js/api.js"></script>
  <script src="js/practice.js"></script>
  <script src="js/stats.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
